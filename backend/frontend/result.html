<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ContentIQ - Analysis Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0a0a0f; color: #f5f2eb; font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; height: 58px; border-bottom: 1px solid rgba(201,168,76,0.2); background-color: rgba(10,10,15,0.95); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Playfair Display', serif; font-size: 18px; color: #c9a84c; letter-spacing: 2px; text-transform: uppercase; }
    .nav-links { display: flex; align-items: center; gap: 5px; }
    .nav-a { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #6b6860; text-decoration: none; padding: 6px 12px; transition: color 0.2s; }
    .nav-a:hover { color: #f5f2eb; }
    .nav-logout { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; border: 1px solid rgba(201,168,76,0.2); color: #6b6860; text-decoration: none; transition: all 0.2s; margin-left: 12px; }
    .nav-logout:hover { border-color: #c9a84c; color: #c9a84c; }
    /* PAGE HEADER */
    .page-header { padding: 35px 50px; border-bottom: 1px solid rgba(201,168,76,0.2); }
    .header-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #7ec87e; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .header-label::before { content: ""; width: 20px; height: 1px; background-color: #7ec87e; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: 30px; }
    .page-header p { font-size: 14px; color: #6b6860; margin-top: 5px; }
    /* SCORE CHIPS ROW */
    .score-row { display: flex; gap: 1px; background-color: rgba(201,168,76,0.2); border: 1px solid rgba(201,168,76,0.2); margin-bottom: 30px; }
    .score-chip { flex: 1; background-color: #0a0a0f; padding: 22px 20px; text-align: center; }
    .score-value { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; line-height: 1; margin-bottom: 5px; }
    .score-value.gold { color: #c9a84c; }
    .score-value.green { color: #7ec87e; }
    .score-name { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #6b6860; }
    .score-badge { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 8px; border: 1px solid; margin-top: 6px; display: inline-block; }
    .score-badge.warn { border-color: rgba(232,201,122,0.4); color: #e8c97a; }
    .score-badge.good { border-color: rgba(126,200,126,0.4); color: #7ec87e; }
    /* MAIN */
    .main { padding: 40px 50px; flex: 1; }
    /* REPORT BLOCKS (accordion style) */
    .report-block { border: 1px solid rgba(201,168,76,0.2); margin-bottom: 2px; }
    /* Clickable header row */
    .block-header { padding: 22px 25px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: background-color 0.2s; }
    .block-header:hover { background-color: rgba(201,168,76,0.03); }
    /* When block is open */
    .block-header.open { border-bottom: 1px solid rgba(201,168,76,0.2); background-color: rgba(201,168,76,0.04); }
    .block-left { display: flex; align-items: center; gap: 14px; }
    .block-icon { font-size: 16px; }
    .block-name { font-size: 15px; font-weight: 500; }
    .block-right { display: flex; align-items: center; gap: 18px; }
    .block-score { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
    .block-score.gold { color: #c9a84c; }
    .block-score.green { color: #7ec87e; }
    /* Arrow that rotates when open */
    .chevron { font-size: 11px; color: #6b6860; transition: transform 0.3s; }
    .block-header.open .chevron { transform: rotate(180deg); }
    /* Collapsible body */
    .block-body { display: none; padding: 28px 25px; background-color: rgba(255,255,255,0.012); }
    .block-body.open { display: block; }
    /* Progress bar */
    .prog-bar { height: 3px; background-color: rgba(255,255,255,0.06); margin-bottom: 22px; overflow: hidden; }
    .prog-fill { height: 100%; width: 0%; transition: width 1.2s ease; }
    .prog-fill.gold { background-color: #c9a84c; }
    .prog-fill.green { background-color: #7ec87e; }
    /* Insights 2-column grid */
    .insights-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background-color: rgba(201,168,76,0.15); margin-bottom: 22px; }
    .insight-cell { background-color: #0a0a0f; padding: 16px 18px; }
    .insight-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #6b6860; margin-bottom: 5px; }
    .insight-value { font-size: 14px; }
    /* Recommendations list */
    .recs-title { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #c9a84c; margin-bottom: 14px; }
    .rec-item { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid rgba(201,168,76,0.06); font-size: 13px; color: #6b6860; line-height: 1.6; }
    .rec-item:last-child { border-bottom: none; }
    /* Arrow bullet */
    .rec-item::before { content: "→"; color: #c9a84c; flex-shrink: 0; font-size: 12px; margin-top: 1px; }
    /* BOTTOM ACTIONS */
    .form-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 25px; border-top: 1px solid rgba(201,168,76,0.2); }
    .btn-gold { display: inline-block; padding: 11px 25px; background-color: #c9a84c; color: #0a0a0f; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; text-decoration: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background-color 0.2s; }
    .btn-gold:hover { background-color: #e8c97a; }
    .btn-ghost { display: inline-block; padding: 11px 25px; border: 1px solid rgba(201,168,76,0.2); color: #6b6860; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: all 0.2s; background: none; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .btn-ghost:hover { border-color: #6b6860; color: #f5f2eb; }
    .btn-green { display: inline-block; padding: 11px 25px; background-color: rgba(126,200,126,0.12); color: #7ec87e; border: 1px solid rgba(126,200,126,0.3); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; transition: all 0.2s; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .btn-green:hover { background-color: rgba(126,200,126,0.22); }
    .action-group { display: flex; gap: 10px; }
    footer { border-top: 1px solid rgba(201,168,76,0.2); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 13px; color: #c9a84c; letter-spacing: 2px; text-transform: uppercase; }
    .footer-copy { font-size: 11px; color: #6b6860; }
    @media (max-width: 820px) { nav { padding: 0 20px; } .page-header { padding: 25px 20px; } .main { padding: 25px 20px; } .score-row { flex-wrap: wrap; } .score-chip { min-width: 45%; } .insights-grid { grid-template-columns: 1fr; } footer { padding: 15px 20px; } }
    /* ============================================
       MOBILE FIRST — Complete responsive system
       Works perfectly on all phones and tablets
       ============================================ */

    /* Base mobile improvements */
    html { -webkit-text-size-adjust: 100%; }
    * { -webkit-tap-highlight-color: transparent; }
    body { overflow-x: hidden; }

    /* ── HAMBURGER MENU ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      background: none;
      border: none;
      z-index: 200;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background-color: #c9a84c;
      transition: all 0.3s ease;
      border-radius: 2px;
    }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    /* Mobile nav overlay */
    .mobile-nav {
      display: none;
      position: fixed;
      top: 58px;
      left: 0;
      right: 0;
      background-color: #0a0a0f;
      border-bottom: 1px solid rgba(201,168,76,0.3);
      padding: 20px;
      z-index: 150;
      flex-direction: column;
      gap: 5px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav .nav-a {
      display: block;
      padding: 14px 16px;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6b6860;
      text-decoration: none;
      border: 1px solid rgba(201,168,76,0.1);
      transition: all 0.2s;
    }
    .mobile-nav .nav-a:hover, .mobile-nav .nav-a.active { color: #c9a84c; border-color: rgba(201,168,76,0.3); }
    .mobile-nav .nav-logout-mob {
      display: block;
      padding: 14px 16px;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6b6860;
      border: 1px solid rgba(201,168,76,0.2);
      background: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      text-align: left;
      transition: all 0.2s;
      margin-top: 5px;
      width: 100%;
    }
    .mobile-nav .nav-logout-mob:hover { border-color: #c9a84c; color: #c9a84c; }

    /* ── RESPONSIVE BREAKPOINTS ── */
    @media (max-width: 768px) {
      /* Nav */
      nav { padding: 0 20px !important; height: 58px; }
      .nav-links { display: none !important; }
      .hamburger { display: flex !important; }

      /* Page headers */
      .page-header { padding: 24px 20px !important; flex-direction: column !important; align-items: flex-start !important; gap: 15px !important; }
      .page-header h1 { font-size: 24px !important; }

      /* Main content */
      .main { padding: 20px 16px !important; }

      /* Stats grids */
      .stats-grid { grid-template-columns: 1fr 1fr !important; }
      .stat-box { border-bottom: 1px solid rgba(201,168,76,0.15) !important; padding: 18px 16px !important; }
      .stat-value { font-size: 28px !important; }

      /* Action cards */
      .actions-grid { grid-template-columns: 1fr !important; }
      .action-card { padding: 22px 18px !important; }

      /* Services grid */
      .services-grid { grid-template-columns: 1fr !important; }
      .svc-card { padding: 20px 18px !important; }
      .svc-card.all-in-one { flex-direction: column !important; align-items: flex-start !important; }

      /* Upload grid */
      .upload-grid { grid-template-columns: 1fr !important; }
      .upload-zone { padding: 35px 20px !important; }
      .paste-zone { padding: 20px 16px !important; }

      /* Score chips */
      .score-row { flex-wrap: wrap !important; }
      .score-chip { min-width: calc(50% - 1px) !important; padding: 16px 12px !important; }
      .score-value { font-size: 24px !important; }

      /* Report blocks */
      .block-header { padding: 16px 18px !important; }
      .block-body { padding: 18px 16px !important; }
      .insights-grid { grid-template-columns: 1fr !important; }
      .insight-cell { padding: 12px 14px !important; }

      /* Profile */
      .profile-layout { grid-template-columns: 1fr !important; }
      .info-grid { grid-template-columns: 1fr !important; }
      .card-top { flex-wrap: wrap !important; gap: 12px !important; }

      /* History table */
      .table-wrap { overflow-x: auto !important; }
      table { min-width: 500px !important; }
      .mini-stats { grid-template-columns: 1fr 1fr !important; }
      .mini-stat { border-bottom: 1px solid rgba(201,168,76,0.15) !important; }

      /* Steps bar */
      .steps-bar { display: none !important; }

      /* Buttons */
      .btn-gold, .btn-ghost, .btn-green { padding: 12px 18px !important; font-size: 11px !important; }
      .form-actions { flex-direction: column !important; gap: 10px !important; }
      .form-actions .action-group { flex-direction: column !important; width: 100% !important; }
      .form-actions .btn-gold, .form-actions .btn-ghost, .form-actions .btn-green { width: 100% !important; text-align: center !important; }

      /* Filter bar */
      .filter-bar { flex-direction: column !important; }
      .filter-bar select, .filter-bar input { width: 100% !important; }

      /* Proc card */
      .proc-card { padding: 35px 24px !important; }

      /* Footer */
      footer { padding: 16px 20px !important; flex-direction: column !important; gap: 8px !important; text-align: center !important; }
      .footer-links { justify-content: center !important; }
    }

    @media (max-width: 400px) {
      .score-chip { min-width: 100% !important; }
      .stats-grid { grid-template-columns: 1fr !important; }
    }

  </style>
</head>
<body>
  <nav>
    <div class="logo">ContentIQ</div>
    <div class="nav-links">
      <a href="/dashboard" class="nav-a">Dashboard</a>
      <a href="/reporthistory" class="nav-a">History</a>
      <a href="/profile" class="nav-a">Profile</a>
      <a href="/" class="nav-logout">Log out</a>
    </div>
  </nav>

  <!-- MOBILE NAV -->
  <div class="mobile-nav" id="mobileNav">
    <a href="/dashboard" class="nav-a">Dashboard</a>
    <a href="/reporthistory" class="nav-a">History</a>
    <a href="/profile" class="nav-a">Profile</a>
    <button class="nav-logout-mob" id="mobileLogoutBtn">Log out</button>
  </div>
  <div class="page-header">
    <div class="header-label">Analysis complete</div>
    <h1>Report results</h1>
    <p id="servicesLine">Services run: loading...</p>
  </div>
  <div class="main">
    <!-- Score chips and report blocks are built by JavaScript below -->
    <div class="score-row" id="scoreRow"></div>
    <div id="reportContainer"></div>
    <div class="form-actions">
      <a href="/uploadcontent" class="btn-ghost">← New analysis</a>
      <div class="action-group">
        <button class="btn-green" onclick="downloadPDF()">↓ Download PDF</button>
        <a href="/dashboard" class="btn-gold">Back to dashboard</a>
      </div>
    </div>
  </div>
  <footer>
    <div class="footer-logo">ContentIQ</div>
    <div class="footer-copy">2026 ContentIQ</div>
  </footer>
  <script>
    // ── AUTH GUARD ──────────────────────────────────────
    var token = localStorage.getItem('contentIQToken');
    if (!token) { window.location.href = '/login'; }

    var stored = JSON.parse(localStorage.getItem('contentIQResults') || 'null');

    if (!stored || !stored.results || !stored.results.length) {
      document.getElementById('servicesLine').textContent = 'No results found. Please run a new analysis.';
    } else {
      var reports = stored.results;

      document.getElementById('servicesLine').textContent =
        'Services run: ' + reports.map(function(r){ return r.name; }).join(', ');

      // ── SCORE CHIPS ───────────────────────────────────
      var scoreRow = document.getElementById('scoreRow');
      reports.forEach(function(r) {
        var lower = (r.badge||'').toLowerCase();
        var bc = (lower.includes('excellent')||lower.includes('original')||lower.includes('human')||lower.includes('low')||lower.includes('optimized')||lower.includes('good')) ? 'good' : 'warn';
        // For AI Detection: show AI% with red, show Human% below
        var displayScore = r.score + '%';
        var subLabel = '';
        if (r.name === 'AI Content Detection') {
          displayScore = r.score + '% AI';
          subLabel = '<div style="font-size:10px;color:#7ec87e;margin-top:2px;">' + (r.humanScore||100-r.score) + '% Human</div>';
          bc = r.score >= 60 ? 'warn' : 'good';
        }
        scoreRow.innerHTML +=
          '<div class="score-chip">' +
            '<div class="score-value '+r.color+'" style="font-size:24px;">' + displayScore + '</div>' +
            subLabel +
            '<div class="score-name">' + r.name + '</div>' +
            '<span class="score-badge '+bc+'">' + r.badge + '</span>' +
          '</div>';
      });

      // ── REPORT BLOCKS ─────────────────────────────────
      var container = document.getElementById('reportContainer');
      reports.forEach(function(r, index) {
        var insights = r.insights || [];
        var recs = r.recommendations || [];
        var isOpen = index === 0 ? ' open' : '';

        var insightsHTML = insights.map(function(ins) {
          return '<div class="insight-cell"><div class="insight-label">' + ins.label +
                 '</div><div class="insight-value">' + ins.value + '</div></div>';
        }).join('');

        var extraHTML = '';

        // GRAMMAR
        if (r.correctedText) {
          extraHTML += '<div class="recs-title" style="margin-top:20px;color:#7ec87e;">✓ Corrected Version</div>' +
            '<div style="background:rgba(126,200,126,0.05);border:1px solid rgba(126,200,126,0.2);padding:16px;margin-bottom:16px;font-size:13px;line-height:1.8;color:#f5f2eb;white-space:pre-wrap;">' + escHtml(r.correctedText) + '</div>';
          if (r.grammarErrors && r.grammarErrors.length > 0) {
            extraHTML += '<div class="recs-title">Errors Found & Fixed</div>';
            r.grammarErrors.forEach(function(e) {
              extraHTML += '<div class="rec-item" style="flex-direction:column;gap:4px;">' +
                '<span style="color:#e05c5c;">✗ Original: "' + escHtml(e.original) + '"</span>' +
                '<span style="color:#7ec87e;">✓ Fixed: "' + escHtml(e.corrected) + '"</span>' +
                '<span style="color:#6b6860;font-size:12px;">' + escHtml(e.explanation) + '</span>' +
              '</div>';
            });
          }
        }

        // HUMANIZER
        if (r.humanizedText) {
          extraHTML += '<div class="recs-title" style="margin-top:20px;color:#c9a84c;">✨ Humanized Version</div>' +
            '<div style="background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);padding:16px;margin-bottom:16px;font-size:13px;line-height:1.8;color:#f5f2eb;white-space:pre-wrap;">' + escHtml(r.humanizedText) + '</div>';
          if (r.techniquesUsed && r.techniquesUsed.length > 0) {
            extraHTML += '<div class="recs-title">Techniques Used</div>';
            r.techniquesUsed.forEach(function(t) {
              extraHTML += '<div class="rec-item">' + escHtml(t) + '</div>';
            });
          }
        }

        // SEO
        if (r.seoOptimizedVersion) {
          extraHTML += '<div class="recs-title" style="margin-top:20px;color:#c9a84c;">📊 SEO-Optimized Version</div>' +
            '<div style="background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);padding:16px;margin-bottom:16px;font-size:13px;line-height:1.8;color:#f5f2eb;white-space:pre-wrap;">' + escHtml(r.seoOptimizedVersion) + '</div>';
        }
        if (r.suggestedKeywords && r.suggestedKeywords.length > 0 && r.name === 'SEO Optimization') {
          extraHTML += '<div class="recs-title">Suggested Keywords to Add</div>';
          r.suggestedKeywords.forEach(function(k) {
            extraHTML += '<div class="rec-item" style="flex-direction:column;gap:3px;">' +
              '<span style="color:#c9a84c;font-weight:500;">' + escHtml(k.keyword) + '</span>' +
              '<span style="color:#6b6860;font-size:12px;">Volume: ' + escHtml(k.searchVolume||'') + ' | Difficulty: ' + escHtml(k.difficulty||'') + ' | Priority: ' + escHtml(k.priority||'') + '</span>' +
              '<span style="color:#6b6860;font-size:12px;">' + escHtml(k.intent||'') + '</span>' +
            '</div>';
          });
        }

        // KEYWORD ANALYSIS
        if (r.name === 'Keyword Analysis') {
          if (r.existingKeywords && r.existingKeywords.length > 0) {
            extraHTML += '<div class="recs-title" style="margin-top:20px;">Keywords Found in Your Text</div>';
            r.existingKeywords.forEach(function(k) {
              extraHTML += '<div class="rec-item" style="justify-content:space-between;">' +
                '<span style="color:#f5f2eb;">"' + escHtml(k.keyword) + '"</span>' +
                '<span style="color:#6b6860;font-size:12px;">' + k.frequency + 'x · ' + escHtml(k.density||'') + '% · ' + escHtml(k.assessment||'') + '</span>' +
              '</div>';
            });
          }
          if (r.suggestedKeywords && r.suggestedKeywords.length > 0) {
            extraHTML += '<div class="recs-title" style="margin-top:16px;">Keywords You Should Target</div>';
            r.suggestedKeywords.forEach(function(k) {
              extraHTML += '<div class="rec-item" style="flex-direction:column;gap:3px;">' +
                '<span style="color:#c9a84c;font-weight:500;">' + escHtml(k.keyword) + '</span>' +
                '<span style="color:#6b6860;font-size:12px;">Volume: ' + escHtml(k.searchVolume||'') + ' | Difficulty: ' + escHtml(k.difficulty||'') + ' | CPC: ' + escHtml(k.cpc||'') + '</span>' +
                '<span style="color:#6b6860;font-size:12px;">How to use: ' + escHtml(k.howToUse||'') + '</span>' +
              '</div>';
            });
          }
          if (r.longTailKeywords && r.longTailKeywords.length > 0) {
            extraHTML += '<div class="recs-title" style="margin-top:16px;">Long-Tail Keyword Opportunities</div>';
            r.longTailKeywords.forEach(function(k) {
              var kText = (typeof k === 'object') ? (k.phrase || k.keyword || '') : k;
              extraHTML += '<div class="rec-item">' + escHtml(kText) + '</div>';
            });
          }
          if (r.questionKeywords && r.questionKeywords.length > 0) {
            extraHTML += '<div class="recs-title" style="margin-top:16px;">Question Keywords to Target</div>';
            r.questionKeywords.forEach(function(k) {
              extraHTML += '<div class="rec-item">' + escHtml(k) + '</div>';
            });
          }
        }

        // AI DETECTION
        if (r.flaggedSentences && r.flaggedSentences.length > 0 && r.name === 'AI Content Detection') {
          extraHTML += '<div class="recs-title" style="margin-top:20px;color:#e05c5c;">⚠ AI-Written Sentences Detected</div>';
          r.flaggedSentences.forEach(function(s) {
            extraHTML += '<div style="background:rgba(224,92,92,0.07);border-left:3px solid rgba(224,92,92,0.5);padding:10px 14px;margin-bottom:8px;font-size:13px;color:#f5f2eb;line-height:1.7;">' + escHtml(s) + '</div>';
          });
          if (r.detectionReasons && r.detectionReasons.length > 0) {
            extraHTML += '<div class="recs-title" style="margin-top:16px;">Why This Was Detected</div>';
            r.detectionReasons.forEach(function(reason) {
              extraHTML += '<div class="rec-item">' + escHtml(reason) + '</div>';
            });
          }
        }

        // PLAGIARISM
        if (r.flaggedSections && r.flaggedSections.length > 0 && r.name === 'Plagiarism Checker') {
          extraHTML += '<div class="recs-title" style="margin-top:20px;color:#e05c5c;">⚠ Flagged Sections</div>';
          r.flaggedSections.forEach(function(s) {
            extraHTML += '<div style="background:rgba(224,92,92,0.07);border:1px solid rgba(224,92,92,0.2);padding:12px 16px;margin-bottom:10px;font-size:13px;line-height:1.7;">' +
              '<div style="color:#e05c5c;margin-bottom:6px;">"' + escHtml(s.text||'') + '"</div>' +
              '<div style="color:#6b6860;font-size:12px;">Reason: ' + escHtml(s.reason||'') + '</div>' +
              '<div style="color:#6b6860;font-size:12px;">Source: ' + escHtml(s.source||'') + ' | Severity: ' + escHtml(s.severity||'') + '</div>' +
              '<div style="color:#7ec87e;font-size:12px;margin-top:4px;">Suggestion: ' + escHtml(s.suggestion||'') + '</div>' +
            '</div>';
          });
        }

        // SUMMARIZATION
        if (r.name === 'Text Summarization') {
          if (r.executiveSummary) {
            extraHTML += '<div class="recs-title" style="margin-top:20px;color:#c9a84c;">📋 Executive Summary</div>' +
              '<div style="background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);padding:16px;margin-bottom:12px;font-size:14px;line-height:1.8;color:#f5f2eb;">' + escHtml(r.executiveSummary) + '</div>';
          }
          if (r.shortSummary) {
            extraHTML += '<div class="recs-title">One-Line Summary</div>' +
              '<div style="background:rgba(126,200,126,0.05);border-left:3px solid #7ec87e;padding:14px;margin-bottom:12px;font-size:14px;line-height:1.8;color:#f5f2eb;">' + escHtml(r.shortSummary) + '</div>';
          }
          if (r.bulletSummary && r.bulletSummary.length > 0) {
            extraHTML += '<div class="recs-title">Key Points</div>';
            r.bulletSummary.forEach(function(p) {
              extraHTML += '<div class="rec-item">' + escHtml(p) + '</div>';
            });
          }
          if (r.studyNotes && r.studyNotes.length > 0) {
            extraHTML += '<div class="recs-title" style="margin-top:12px;">Study Notes</div>';
            r.studyNotes.forEach(function(n) {
              extraHTML += '<div class="rec-item">' + escHtml(n) + '</div>';
            });
          }
        }

        // FORMATTING
        if (r.name === 'Formatting Assistance') {
          if (r.formattedVersion) {
            extraHTML += '<div class="recs-title" style="margin-top:20px;color:#c9a84c;">📐 Formatted Version</div>' +
              '<div style="background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);padding:16px;margin-bottom:12px;font-size:13px;line-height:1.8;color:#f5f2eb;white-space:pre-wrap;">' + escHtml(r.formattedVersion) + '</div>';
          }
          if (r.tableOfContents && r.tableOfContents.length > 0) {
            extraHTML += '<div class="recs-title">Suggested Table of Contents</div>';
            r.tableOfContents.forEach(function(s, i) {
              extraHTML += '<div class="rec-item">' + (i+1) + '. ' + escHtml(s) + '</div>';
            });
          }
          if (r.formattingIssues && r.formattingIssues.length > 0) {
            extraHTML += '<div class="recs-title" style="margin-top:12px;color:#e05c5c;">⚠ Formatting Issues Found</div>';
            r.formattingIssues.forEach(function(issue) {
              extraHTML += '<div class="rec-item" style="flex-direction:column;gap:3px;">' +
                '<span style="color:#f5f2eb;font-weight:500;">' + escHtml(issue.issue||'') + '</span>' +
                '<span style="color:#6b6860;font-size:12px;">Severity: ' + escHtml(issue.severity||'') + ' — Fix: ' + escHtml(issue.fix||issue.suggestion||'') + '</span>' +
              '</div>';
            });
          }
        }

        var recsHTML = recs.length > 0
          ? '<div class="recs-title" style="margin-top:16px;">Recommendations</div>' +
            recs.map(function(rec){ return '<div class="rec-item">' + escHtml(rec) + '</div>'; }).join('')
          : '';

        var block = document.createElement('div');
        block.className = 'report-block';
        block.innerHTML =
          '<div class="block-header' + isOpen + '" onclick="toggleBlock(this)">' +
            '<div class="block-left">' +
              '<span class="block-icon">' + (r.icon||'📋') + '</span>' +
              '<span class="block-name">' + r.name + '</span>' +
            '</div>' +
            '<div class="block-right">' +
              '<span class="block-score ' + r.color + '">' + r.score + '%</span>' +
              '<span class="chevron">▾</span>' +
            '</div>' +
          '</div>' +
          '<div class="block-body' + isOpen + '">' +
            '<div class="prog-bar"><div class="prog-fill ' + r.color + '" data-width="' + r.score + '"></div></div>' +
            '<div class="insights-grid">' + insightsHTML + '</div>' +
            extraHTML +
            recsHTML +
          '</div>';
        container.appendChild(block);
      });
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function toggleBlock(header) {
      header.classList.toggle('open');
      header.nextElementSibling.classList.toggle('open');
    }

    setTimeout(function() {
      document.querySelectorAll('.prog-fill').forEach(function(bar) {
        bar.style.width = bar.getAttribute('data-width') + '%';
      });
    }, 200);

    // ── PDF DOWNLOAD ──────────────────────────────────────
    function downloadPDF() {
      if (!stored || !stored.results || !stored.results.length) {
        alert('No results to download.'); return;
      }
      var reports = stored.results;
      var now = new Date();
      var dateStr = now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
      var timeStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

      var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ContentIQ Analysis Report</title><style>' +
        '* { margin:0; padding:0; box-sizing:border-box; }' +
        'body { font-family: Arial,sans-serif; background:#fff; color:#1a1a1a; font-size:13px; line-height:1.6; }' +
        '.header { background:#0a0a0f; color:#c9a84c; padding:30px 40px; }' +
        '.header h1 { font-size:28px; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; }' +
        '.header .sub { font-size:12px; color:#888; }' +
        '.meta { background:#f8f8f8; padding:16px 40px; border-bottom:2px solid #e0e0e0; display:flex; justify-content:space-between; font-size:12px; color:#555; }' +
        '.scores-row { display:flex; flex-wrap:wrap; border-bottom:2px solid #e0e0e0; }' +
        '.score-chip { flex:1; min-width:120px; padding:20px 16px; text-align:center; border-right:1px solid #e0e0e0; }' +
        '.score-num { font-size:30px; font-weight:700; line-height:1; margin-bottom:4px; }' +
        '.score-num.gold { color:#c9a84c; } .score-num.green { color:#2e9e4f; } .score-num.warn { color:#e05c5c; }' +
        '.score-name { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#666; }' +
        '.score-badge { font-size:10px; padding:2px 8px; background:#f0f0f0; color:#555; display:inline-block; margin-top:5px; }' +
        '.service-block { border-bottom:2px solid #e8e8e8; page-break-inside:avoid; }' +
        '.service-header { padding:18px 40px; background:#f5f5f5; border-bottom:1px solid #e0e0e0; display:flex; align-items:center; justify-content:space-between; }' +
        '.service-title { font-size:16px; font-weight:600; }' +
        '.service-score { font-size:22px; font-weight:700; }' +
        '.service-score.gold { color:#c9a84c; } .service-score.green { color:#2e9e4f; } .service-score.warn { color:#e05c5c; }' +
        '.service-body { padding:20px 40px; }' +
        '.insights-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:#e0e0e0; border:1px solid #e0e0e0; margin-bottom:20px; }' +
        '.insight-cell { background:#fff; padding:10px 14px; }' +
        '.insight-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#888; margin-bottom:3px; }' +
        '.insight-value { font-size:13px; }' +
        '.section-title { font-size:11px; text-transform:uppercase; letter-spacing:2px; color:#c9a84c; font-weight:600; margin:18px 0 10px; border-bottom:1px solid #f0e8d0; padding-bottom:5px; }' +
        '.content-box { background:#fafafa; border:1px solid #e0e0e0; border-left:3px solid #c9a84c; padding:14px 16px; font-size:13px; line-height:1.8; white-space:pre-wrap; word-wrap:break-word; margin-bottom:16px; }' +
        '.content-box.green-border { border-left-color:#2e9e4f; }' +
        '.rec-item { padding:7px 0; border-bottom:1px solid #f0f0f0; font-size:13px; color:#333; display:flex; gap:8px; }' +
        '.rec-item::before { content:"→"; color:#c9a84c; flex-shrink:0; }' +
        '.error-item { margin-bottom:10px; padding:10px; background:#fff8f8; border:1px solid #ffd0d0; font-size:12px; }' +
        '.flagged-item { margin-bottom:10px; padding:10px; background:#fff8f8; border-left:3px solid #e05c5c; font-size:12px; }' +
        '.keyword-item { margin-bottom:10px; padding:10px; background:#f8f8f8; border:1px solid #e8e8e8; font-size:12px; }' +
        '.keyword-name { font-weight:600; color:#c9a84c; font-size:13px; }' +
        '.footer { background:#0a0a0f; color:#666; padding:16px 40px; font-size:11px; display:flex; justify-content:space-between; margin-top:20px; }' +
        '@media print { body { -webkit-print-color-adjust:exact; print-color-adjust:exact; } .service-block { page-break-inside:avoid; } }' +
      '</style></head><body>';

      html += '<div class="header"><h1>ContentIQ</h1><div class="sub">Content Intelligence Analysis Report</div></div>';
      html += '<div class="meta"><span>Generated: ' + dateStr + ' at ' + timeStr + '</span><span>Services Analyzed: ' + reports.length + '</span><span>ContentIQ Platform</span></div>';

      // Score chips
      html += '<div class="scores-row">';
      reports.forEach(function(r) {
        var displayScore = r.score + '%';
        if (r.name === 'AI Content Detection') displayScore = r.score + '% AI';
        html += '<div class="score-chip"><div class="score-num ' + r.color + '">' + displayScore + '</div><div class="score-name">' + r.name + '</div><div class="score-badge">' + r.badge + '</div></div>';
      });
      html += '</div>';

      // Service blocks
      reports.forEach(function(r) {
        html += '<div class="service-block"><div class="service-header"><div class="service-title">' + (r.icon||'') + ' ' + r.name + '</div><div class="service-score ' + r.color + '">' + r.score + '% — ' + r.badge + '</div></div><div class="service-body">';

        // Insights
        if (r.insights && r.insights.length) {
          html += '<div class="insights-grid">';
          r.insights.forEach(function(ins) {
            html += '<div class="insight-cell"><div class="insight-label">' + escPdf(ins.label) + '</div><div class="insight-value">' + escPdf(ins.value) + '</div></div>';
          });
          html += '</div>';
        }

        // Grammar corrected text
        if (r.correctedText) {
          html += '<div class="section-title">✓ Corrected Version</div><div class="content-box green-border">' + escPdf(r.correctedText) + '</div>';
          if (r.grammarErrors && r.grammarErrors.length) {
            html += '<div class="section-title">Errors Found & Fixed (' + r.grammarErrors.length + ')</div>';
            r.grammarErrors.forEach(function(e) {
              html += '<div class="error-item"><div style="color:#e05c5c;">✗ "' + escPdf(e.original) + '"</div><div style="color:#2e7d32;">✓ "' + escPdf(e.corrected) + '"</div><div style="color:#666;">' + escPdf(e.explanation) + '</div></div>';
            });
          }
        }

        // Humanizer
        if (r.humanizedText) {
          html += '<div class="section-title">✨ Humanized Version</div><div class="content-box">' + escPdf(r.humanizedText) + '</div>';
          if (r.techniquesUsed && r.techniquesUsed.length) {
            html += '<div class="section-title">Techniques Used</div>';
            r.techniquesUsed.forEach(function(t) { html += '<div class="rec-item">' + escPdf(t) + '</div>'; });
          }
        }

        // SEO
        if (r.seoOptimizedVersion) {
          html += '<div class="section-title">📊 SEO-Optimized Version</div><div class="content-box">' + escPdf(r.seoOptimizedVersion) + '</div>';
        }
        if (r.suggestedKeywords && r.suggestedKeywords.length && r.name === 'SEO Optimization') {
          html += '<div class="section-title">Suggested Keywords to Add</div>';
          r.suggestedKeywords.forEach(function(k) {
            html += '<div class="keyword-item"><div class="keyword-name">' + escPdf(k.keyword) + '</div><div>Volume: ' + escPdf(k.searchVolume||'') + ' | Difficulty: ' + escPdf(k.difficulty||'') + ' | Priority: ' + escPdf(k.priority||'') + '</div><div style="color:#666;">' + escPdf(k.intent||'') + '</div></div>';
          });
        }

        // Keywords
        if (r.name === 'Keyword Analysis') {
          if (r.existingKeywords && r.existingKeywords.length) {
            html += '<div class="section-title">Keywords Found in Your Text</div>';
            r.existingKeywords.forEach(function(k) {
              html += '<div class="keyword-item"><div class="keyword-name">"' + escPdf(k.keyword) + '"</div><div>Appears ' + k.frequency + ' times · Density: ' + escPdf(k.density||'') + '% · ' + escPdf(k.assessment||'') + '</div></div>';
            });
          }
          if (r.suggestedKeywords && r.suggestedKeywords.length) {
            html += '<div class="section-title">Keywords You Should Target</div>';
            r.suggestedKeywords.forEach(function(k) {
              html += '<div class="keyword-item"><div class="keyword-name">' + escPdf(k.keyword) + '</div><div>Volume: ' + escPdf(k.searchVolume||'') + ' | Difficulty: ' + escPdf(k.difficulty||'') + ' | CPC: ' + escPdf(k.cpc||'') + '</div><div style="color:#666;">How to use: ' + escPdf(k.howToUse||'') + '</div></div>';
            });
          }
          if (r.longTailKeywords && r.longTailKeywords.length) {
            html += '<div class="section-title">Long-Tail Keyword Opportunities</div>';
            r.longTailKeywords.forEach(function(k) {
              var kText = (typeof k === 'object') ? (k.phrase||k.keyword||'') : k;
              html += '<div class="rec-item">' + escPdf(kText) + '</div>';
            });
          }
          if (r.questionKeywords && r.questionKeywords.length) {
            html += '<div class="section-title">Question Keywords</div>';
            r.questionKeywords.forEach(function(k) { html += '<div class="rec-item">' + escPdf(k) + '</div>'; });
          }
        }

        // AI Detection
        if (r.flaggedSentences && r.flaggedSentences.length && r.name === 'AI Content Detection') {
          html += '<div class="section-title">⚠ AI-Written Sentences Detected</div>';
          r.flaggedSentences.forEach(function(s) { html += '<div class="flagged-item">"' + escPdf(s) + '"</div>'; });
          if (r.detectionReasons && r.detectionReasons.length) {
            html += '<div class="section-title">Why This Was Detected</div>';
            r.detectionReasons.forEach(function(reason) { html += '<div class="rec-item">' + escPdf(reason) + '</div>'; });
          }
        }

        // Plagiarism
        if (r.flaggedSections && r.flaggedSections.length && r.name === 'Plagiarism Checker') {
          html += '<div class="section-title">⚠ Flagged Sections</div>';
          r.flaggedSections.forEach(function(s) {
            html += '<div class="flagged-item"><div style="color:#e05c5c;margin-bottom:5px;">"' + escPdf(s.text||'') + '"</div><div style="color:#666;">Reason: ' + escPdf(s.reason||'') + '</div><div style="color:#666;">Source: ' + escPdf(s.source||'') + ' | Severity: ' + escPdf(s.severity||'') + '</div><div style="color:#2e7d32;">Suggestion: ' + escPdf(s.suggestion||'') + '</div></div>';
          });
        }

        // Summarization
        if (r.name === 'Text Summarization') {
          if (r.executiveSummary) html += '<div class="section-title">Executive Summary</div><div class="content-box">' + escPdf(r.executiveSummary) + '</div>';
          if (r.shortSummary) html += '<div class="section-title">One-Line Summary</div><div class="content-box green-border">' + escPdf(r.shortSummary) + '</div>';
          if (r.bulletSummary && r.bulletSummary.length) {
            html += '<div class="section-title">Key Points</div>';
            r.bulletSummary.forEach(function(p) { html += '<div class="rec-item">' + escPdf(p) + '</div>'; });
          }
          if (r.studyNotes && r.studyNotes.length) {
            html += '<div class="section-title">Study Notes</div>';
            r.studyNotes.forEach(function(n) { html += '<div class="rec-item">' + escPdf(n) + '</div>'; });
          }
        }

        // Formatting
        if (r.name === 'Formatting Assistance') {
          if (r.formattedVersion) html += '<div class="section-title">Formatted Version</div><div class="content-box">' + escPdf(r.formattedVersion) + '</div>';
          if (r.tableOfContents && r.tableOfContents.length) {
            html += '<div class="section-title">Table of Contents</div>';
            r.tableOfContents.forEach(function(s, i) { html += '<div class="rec-item">' + (i+1) + '. ' + escPdf(s) + '</div>'; });
          }
          if (r.formattingIssues && r.formattingIssues.length) {
            html += '<div class="section-title">Formatting Issues Found</div>';
            r.formattingIssues.forEach(function(issue) {
              html += '<div class="flagged-item"><div style="font-weight:bold;">' + escPdf(issue.issue||'') + '</div><div>Severity: ' + escPdf(issue.severity||'') + '</div><div style="color:#2e7d32;">Fix: ' + escPdf(issue.fix||issue.suggestion||'') + '</div></div>';
            });
          }
        }

        // Recommendations
        if (r.recommendations && r.recommendations.length) {
          html += '<div class="section-title">Recommendations</div>';
          r.recommendations.forEach(function(rec) { html += '<div class="rec-item">' + escPdf(rec) + '</div>'; });
        }

        html += '</div></div>';
      });

      html += '<div class="footer"><span>ContentIQ — Content Intelligence Platform</span><span>Generated on ' + dateStr + '</span></div>';
      html += '</body></html>';

      var win = window.open('', '_blank');
      win.document.write(html);
      win.document.close();
      win.onload = function() { win.focus(); win.print(); };
    }

    function escPdf(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
