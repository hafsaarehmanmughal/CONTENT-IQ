<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ContentIQ - History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0a0a0f; color: #f5f2eb; font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 0 50px; height: 58px; border-bottom: 1px solid rgba(201,168,76,0.2); background-color: rgba(10,10,15,0.95); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Playfair Display', serif; font-size: 18px; color: #c9a84c; letter-spacing: 2px; text-transform: uppercase; }
    .nav-links { display: flex; align-items: center; gap: 5px; }
    .nav-a { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #6b6860; text-decoration: none; padding: 6px 12px; transition: color 0.2s; position: relative; }
    .nav-a:hover, .nav-a.active { color: #f5f2eb; }
    .nav-a.active::after { content: ""; position: absolute; bottom: -1px; left: 12px; right: 12px; height: 1px; background-color: #c9a84c; }
    .nav-logout { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; padding: 6px 14px; border: 1px solid rgba(201,168,76,0.2); color: #6b6860; text-decoration: none; transition: all 0.2s; margin-left: 12px; }
    .nav-logout:hover { border-color: #c9a84c; color: #c9a84c; }
    /* PAGE HEADER */
    .page-header { padding: 35px 50px; border-bottom: 1px solid rgba(201,168,76,0.2); display: flex; justify-content: space-between; align-items: flex-end; }
    .header-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #c9a84c; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .header-label::before { content: ""; width: 20px; height: 1px; background-color: #c9a84c; }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: 30px; }
    .page-header p { font-size: 14px; color: #6b6860; margin-top: 5px; }
    .btn-gold { display: inline-block; padding: 10px 22px; background-color: #c9a84c; color: #0a0a0f; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; text-decoration: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background-color 0.2s; }
    .btn-gold:hover { background-color: #e8c97a; }
    /* MAIN */
    .main { padding: 40px 50px; flex: 1; }
    /* MINI STATS */
    .mini-stats { display: grid; grid-template-columns: repeat(4, 1fr); border: 1px solid rgba(201,168,76,0.2); margin-bottom: 30px; }
    .mini-stat { padding: 20px 25px; border-right: 1px solid rgba(201,168,76,0.2); text-align: center; }
    .mini-stat:last-child { border-right: none; }
    .mini-val { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #c9a84c; line-height: 1; margin-bottom: 5px; }
    .mini-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #6b6860; }
    /* FILTER BAR */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    /* Search input */
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap::before { content: "⌕"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #6b6860; font-size: 16px; pointer-events: none; }
    .filter-bar input { width: 100%; padding: 10px 12px 10px 34px; background-color: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2); color: #f5f2eb; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .filter-bar input:focus { border-color: #c9a84c; }
    .filter-bar input::placeholder { color: rgba(107,104,96,0.5); }
    /* Dropdown filters */
    .filter-bar select { padding: 10px 12px; background-color: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2); color: #f5f2eb; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; cursor: pointer; min-width: 160px; }
    .filter-bar select:focus { border-color: #c9a84c; }
    option { background-color: #0a0a0f; }
    /* TABLE */
    .table-wrap { border: 1px solid rgba(201,168,76,0.2); }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #6b6860; padding: 12px 20px; text-align: left; border-bottom: 1px solid rgba(201,168,76,0.2); font-weight: 400; background-color: rgba(255,255,255,0.02); }
    tbody td { font-size: 14px; padding: 12px 20px; border-bottom: 1px solid rgba(201,168,76,0.06); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background-color: rgba(201,168,76,0.025); }
    /* Status badges */
    .badge { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border: 1px solid; }
    .badge.done { border-color: rgba(126,200,126,0.4); color: #7ec87e; }
    .badge.proc { border-color: rgba(201,168,76,0.4); color: #c9a84c; }
    /* Table buttons */
    .tbl-btn { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 12px; border: 1px solid rgba(201,168,76,0.2); background: none; color: #6b6860; cursor: pointer; transition: all 0.2s; margin-right: 5px; font-family: 'DM Sans', sans-serif; text-decoration: none; display: inline-block; }
    .tbl-btn:hover { border-color: #c9a84c; color: #c9a84c; }
    .tbl-btn.del { border-color: rgba(224,92,92,0.25); color: rgba(224,92,92,0.65); }
    .tbl-btn.del:hover { border-color: rgba(224,92,92,0.7); color: rgb(224,92,92); }
    /* Empty state */
    .empty-msg { text-align: center; padding: 50px; color: #6b6860; font-size: 14px; display: none; }
    footer { border-top: 1px solid rgba(201,168,76,0.2); padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 13px; color: #c9a84c; letter-spacing: 2px; text-transform: uppercase; }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: #6b6860; text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: #f5f2eb; }
    .footer-copy { font-size: 11px; color: #6b6860; }
    @media (max-width: 820px) { nav { padding: 0 20px; } .page-header { flex-direction: column; align-items: flex-start; gap: 15px; padding: 25px 20px; } .main { padding: 25px 20px; } .mini-stats { grid-template-columns: 1fr 1fr; } .mini-stat { border-bottom: 1px solid rgba(201,168,76,0.2); } footer { padding: 15px 20px; } }
  </style>
</head>
<body>
  <nav>
    <div class="logo">ContentIQ</div>
    <div class="nav-links">
      <a href="/dashboard" class="nav-a">Dashboard</a>
      <a href="/reporthistory" class="nav-a active">History</a>
      <a href="/profile" class="nav-a">Profile</a>
      <button type="button" class="nav-logout" id="logoutBtn">Log out</button>
    </div>
  </nav>
  <div class="page-header">
    <div>
      <div class="header-label">History</div>
      <h1>Report history</h1>
      <p>Browse and manage all your previous analyses</p>
    </div>
    <a href="/uploadcontent" class="btn-gold">+ New analysis</a>
  </div>
  <div class="main">
    <!-- MINI STATS -->
    <div class="mini-stats">
      <div class="mini-stat"><div class="mini-val">24</div><div class="mini-label">Total reports</div></div>
      <div class="mini-stat"><div class="mini-val">21</div><div class="mini-label">Completed</div></div>
      <div class="mini-stat"><div class="mini-val">3</div><div class="mini-label">Processing</div></div>
      <div class="mini-stat"><div class="mini-val">92%</div><div class="mini-label">Success rate</div></div>
    </div>
    <!-- FILTERS -->
    <div class="filter-bar">
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search by file name..." oninput="filterTable()">
      </div>
      <select id="svcFilter" onchange="filterTable()">
        <option value="">All services</option>
        <option value="SEO">SEO</option>
        <option value="AI">AI detection</option>
        <option value="Plagiarism">Plagiarism</option>
        <option value="Grammar">Grammar</option>
      </select>
      <select id="statusFilter" onchange="filterTable()">
        <option value="">All statuses</option>
        <option value="Completed">Completed</option>
        <option value="Processing">Processing</option>
      </select>
    </div>
    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>File name</th>
            <th>Services</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Rows are loaded dynamically from the API -->
        </tbody>
      </table>
      <div class="empty-msg" id="emptyMsg">No reports match your search.</div>
    </div>
  </div>
  <footer>
    <div class="footer-logo">ContentIQ</div>
    <div class="footer-links"><a href="#">About</a><a href="#">Contact</a><a href="#">Privacy</a></div>
    <div class="footer-copy">2026 ContentIQ</div>
  </footer>
  <script>
    // ─── AUTH GUARD ──────────────────────────────────────────────────────────
    const token = localStorage.getItem("contentIQToken");
    if (!token) {
      localStorage.removeItem("contentIQToken"); localStorage.removeItem("contentIQUser"); window.location.href = "/login";
    }

    // ─── LOGOUT ───────────────────────────────────────────────────────────────
    document.getElementById("logoutBtn").addEventListener("click", function() {
      localStorage.removeItem("contentIQToken");
      localStorage.removeItem("contentIQUser");
      localStorage.removeItem("contentIQUploadData");
      localStorage.removeItem("contentIQSelectedServices");
      localStorage.removeItem("contentIQResults");
      window.location.href = "/";
    });

    // ─── LOAD REAL HISTORY FROM API ───────────────────────────────────────────
    async function loadHistory() {
      try {
        const response = await fetch("/api/analyze/history", {
          headers: { "Authorization": "Bearer " + token }
        });
        const data = await response.json();

        if (!response.ok) {
          if (response.status === 401) { localStorage.removeItem("contentIQToken"); localStorage.removeItem("contentIQUser"); window.location.href = "/login"; return; }
          return;
        }

        // Update stats
        document.querySelectorAll(".mini-val")[0].textContent = data.stats.total;
        document.querySelectorAll(".mini-val")[1].textContent = data.stats.completed;
        document.querySelectorAll(".mini-val")[2].textContent = data.stats.processing;
        document.querySelectorAll(".mini-val")[3].textContent = data.stats.successRate + "%";

        // Build table rows from real data
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        if (data.reports.length === 0) {
          document.getElementById("emptyMsg").style.display = "block";
          return;
        }

        data.reports.forEach(function(r) {
          const date = new Date(r.createdAt).toLocaleDateString("en-US", {
            month: "short", day: "numeric", year: "numeric"
          });
          const svcNames = r.services.map(function(s) {
            return s.replace(/_/g, " ").replace(/\b\w/g, function(c){ return c.toUpperCase(); });
          }).join(", ");
          const statusClass = r.status === "completed" ? "done" : "proc";
          const statusText  = r.status === "completed" ? "Completed" : "Processing";
          const fileName    = r.fileName || "Pasted text";

          const tr = document.createElement("tr");
          tr.setAttribute("data-name", fileName.toLowerCase());
          tr.setAttribute("data-svc", r.services.join(" "));
          tr.setAttribute("data-status", r.status === "completed" ? "Completed" : "Processing");
          tr.innerHTML =
            "<td>" + date + "</td>" +
            "<td>" + fileName + "</td>" +
            "<td>" + svcNames + "</td>" +
            "<td><span class=\"badge " + statusClass + "\">" + statusText + "</span></td>" +
            "<td>" +
              "<a href=\"/result?id=" + r.id + "\" class=\"tbl-btn\" onclick=\"loadReport(" + r.id + ")\">View</a>" +
              "<button class=\"tbl-btn del\" onclick=\"deleteReport(" + r.id + ", this)\">Delete</button>" +
            "</td>";
          tbody.appendChild(tr);
        });

        filterTable();

      } catch(err) {
        console.error("History load error:", err);
      }
    }

    // ─── LOAD A SPECIFIC REPORT AND GO TO RESULT PAGE ────────────────────────
    async function loadReport(id) {
      try {
        const response = await fetch("/api/analyze/" + id, {
          headers: { "Authorization": "Bearer " + token }
        });
        const data = await response.json();
        if (response.ok && data.report.results) {
          localStorage.setItem("contentIQResults", JSON.stringify({
            reportId: data.report.id,
            results: data.report.results
          }));
        }
      } catch(err) { console.error(err); }
      // navigation happens via the <a> href
    }

    // ─── DELETE A REPORT ──────────────────────────────────────────────────────
    async function deleteReport(id, btn) {
      if (!confirm("Delete this report permanently?")) return;
      try {
        const response = await fetch("/api/analyze/" + id, {
          method: "DELETE",
          headers: { "Authorization": "Bearer " + token }
        });
        if (response.ok) {
          btn.closest("tr").remove();
          filterTable();
        } else {
          alert("Could not delete report.");
        }
      } catch(err) {
        alert("Connection error.");
      }
    }

    // ─── FILTER TABLE ──────────────────────────────────────────────────────────
    function filterTable() {
      var search = document.getElementById("searchInput").value.toLowerCase();
      var svc    = document.getElementById("svcFilter").value;
      var status = document.getElementById("statusFilter").value;
      var rows   = document.querySelectorAll("#tableBody tr");
      var count  = 0;
      rows.forEach(function(row) {
        var name      = (row.getAttribute("data-name") || "").toLowerCase();
        var rowSvc    = row.getAttribute("data-svc") || "";
        var rowStatus = row.getAttribute("data-status") || "";
        var ok = name.includes(search) &&
                 (!svc    || rowSvc.includes(svc)) &&
                 (!status || rowStatus === status);
        row.style.display = ok ? "" : "none";
        if (ok) count++;
      });
      document.getElementById("emptyMsg").style.display = count === 0 ? "block" : "none";
    }

    // Load on page ready
    loadHistory();
  </script>
</body>
</html>
